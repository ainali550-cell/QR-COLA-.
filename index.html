<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Cola Store</title>

<style>
:root {
--red:#E8001D;
--black:#0A0A0A;
--white:#fff;
--gray:#f4f4f5;
}

body {margin:0;font-family:Arial;background:var(--gray);}

/* NAV */
.nav {
background:var(--black);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
}

/* HERO */
.hero {
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1622543925917-763c34d1a86e');
background-size:cover;
color:white;
text-align:center;
padding:80px 20px;
}

/* PRODUCTS */
.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:40px;
}

.card {
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.qty {display:flex;justify-content:center;gap:10px;margin:10px 0;}

.btn {
background:var(--red);
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
}

/* CART */
.cart {
background:white;
margin:30px;
padding:25px;
border-radius:15px;
}

.item {display:flex;justify-content:space-between;padding:10px 0;}

.total {font-weight:bold;margin-top:10px;}

.form input {
width:100%;
padding:10px;
margin:6px 0;
}
</style>
</head>

<body>

<div class="nav">
<h2>QR COLA</h2>
</div>

<div class="hero">
<h1>QR COLA</h1>
<p>Order Fresh Crates Online</p>
</div>

<div class="grid">

<div class="card">
<h3>1.5L Crate (6 Bottles)</h3>
<p>Rs 700</p>
<div class="qty">
<button onclick="changeQty(1,-1)">-</button>
<span id="q1">1</span>
<button onclick="changeQty(1,1)">+</button>
</div>
<button class="btn" onclick="addToCart(1,'1.5L Crate',700)">Add</button>
</div>

<div class="card">
<h3>2.25L Crate (4 Bottles)</h3>
<p>Rs 700</p>
<div class="qty">
<button onclick="changeQty(2,-1)">-</button>
<span id="q2">1</span>
<button onclick="changeQty(2,1)">+</button>
</div>
<button class="btn" onclick="addToCart(2,'2.25L Crate',700)">Add</button>
</div>

</div>

<div class="cart">
<h2>Your Cart</h2>
<div id="items"></div>
<div id="total" class="total"></div>

<h3>Delivery Info</h3>
<div class="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
</div>

<button class="btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
let cart={};
let qty={1:1,2:1};

function changeQty(id,val){
qty[id]+=val;
if(qty[id]<1)qty[id]=1;
document.getElementById("q"+id).innerText=qty[id];
}

function addToCart(id,name,price){
if(!cart[id]) cart[id]={name,price,qty:0};
cart[id].qty+=qty[id];
render();
}

function render(){
let html="",total=0;
Object.values(cart).forEach(i=>{
let t=i.qty*i.price;
total+=t;
html+=`${i.name} x ${i.qty} = Rs ${t}<br>`;
});
document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText="Total: Rs "+total;
}

function placeOrder(){
let n=name.value,p=phone.value,a=address.value;
if(!n||!p||!a){alert("Fill all fields");return;}

let msg="QR Cola Order:%0A";

Object.values(cart).forEach(i=>{
msg+=`${i.name} x ${i.qty}%0A`;
});

let total=Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);

msg+=`Total: Rs ${total}%0AName:${n}%0APhone:${p}%0AAddress:${a}`;

localStorage.setItem("orderMsg",msg);

window.location.href="success.html";
}
</script>

</body>
</html>
